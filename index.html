<!DOCTYPE html>
<html lang="en" data-t="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#252359">
<title>DSLRSWALA RMS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --royal:#252359; --baby:#90CCFF; --orange:#F3861F;
  --green:#22C55E; --red:#EF4444; --amber:#F59E0B;
}
[data-t="light"]{
  --bg:#F0F4FF; --bg1:#FFFFFF; --bg2:#F3F4F6; --bg3:#F8FAFC;
  --line:#E5E7EB; --line2:rgba(0,0,0,.06);
  --txt:#111827; --txt2:#6B7280; --txt3:#9CA3AF;
  --hover:rgba(37,35,89,.04);
  --card-sh:0 1px 3px rgba(17,24,39,.06), 0 1px 2px rgba(17,24,39,.04);
  --card-sh-hi:0 4px 12px rgba(37,35,89,.08);
}
[data-t="dark"]{
  --bg:#0d0f1a; --bg1:#161826; --bg2:#1f2233; --bg3:#0d0f1a;
  --line:#2a2d3f; --line2:rgba(255,255,255,.06);
  --txt:#F9FAFB; --txt2:#9CA3AF; --txt3:#6B7280;
  --hover:rgba(255,255,255,.03);
  --card-sh:none;
  --card-sh-hi:0 4px 12px rgba(0,0,0,.4);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
body{font-family:'Plus Jakarta Sans',system-ui,sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;-webkit-font-smoothing:antialiased;transition:background .3s,color .3s}
.mono{font-family:'DM Mono',ui-monospace,monospace}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--line);border-radius:3px}
button{cursor:pointer;font-family:inherit;border:0;background:0;color:inherit}
input,select,textarea{font-family:inherit;font-size:13px}
a{text-decoration:none;color:inherit}
.hidden{display:none!important}

/* ── LOCK SCREEN ─────────────────────────────── */
#sc-lock{position:fixed;inset:0;background:#0a0b14;z-index:9999;display:flex;align-items:center;justify-content:center;flex-direction:column;padding:24px;color:#fff}
#sc-lock.hidden{display:none}
#sc-lock .lock-bg{position:absolute;inset:0;background:radial-gradient(circle at 20% 20%, rgba(37,35,89,.4), transparent 50%),radial-gradient(circle at 80% 80%, rgba(243,134,31,.15), transparent 50%);pointer-events:none}
#sc-lock .lock-card{position:relative;z-index:1;max-width:340px;width:100%;text-align:center}
#sc-lock .lock-logo{width:64px;height:64px;border-radius:16px;background:linear-gradient(135deg,#90CCFF,#fff);display:grid;place-items:center;font-size:28px;font-weight:800;color:#252359;margin:0 auto 24px;box-shadow:0 0 0 1px rgba(255,255,255,.1),0 8px 32px rgba(144,204,255,.2)}
#sc-lock .lock-brand{font-weight:800;font-size:18px;letter-spacing:.04em;margin-bottom:4px}
#sc-lock .lock-sub{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:#90CCFF;margin-bottom:32px;font-weight:600}
#sc-lock .lock-prompt{font-size:13px;color:rgba(255,255,255,.55);margin-bottom:22px}
#sc-lock .pin-dots{display:flex;justify-content:center;gap:14px;margin-bottom:30px}
#sc-lock .pin-dot{width:14px;height:14px;border-radius:50%;background:rgba(255,255,255,.12);transition:all .15s}
#sc-lock .pin-dot.filled{background:#90CCFF;box-shadow:0 0 12px rgba(144,204,255,.5);transform:scale(1.05)}
#sc-lock.shake .pin-dots{animation:shakeX .4s}
#sc-lock.shake .pin-dot.filled{background:#EF4444;box-shadow:0 0 12px rgba(239,68,68,.6)}
@keyframes shakeX{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)}}
#sc-lock .pin-pad{display:grid;grid-template-columns:repeat(3,72px);gap:13px;justify-content:center}
#sc-lock .pin-key{width:72px;height:72px;border-radius:50%;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);color:#fff;font-family:'DM Mono',monospace;font-size:24px;display:grid;place-items:center;transition:all .12s;-webkit-tap-highlight-color:transparent;user-select:none;touch-action:manipulation}
#sc-lock .pin-key:active{transform:scale(.94);background:rgba(144,204,255,.15);border-color:rgba(144,204,255,.3)}
#sc-lock .pin-key.delete{font-size:20px;color:rgba(255,255,255,.6)}
#sc-lock .pin-key.empty{background:transparent;border:0;pointer-events:none}
#sc-lock .lock-error{height:18px;margin-top:16px;font-size:12px;color:#EF4444;font-weight:500;opacity:0;transition:opacity .2s}
#sc-lock .lock-error.show{opacity:1}
#sc-lock .lock-foot{position:absolute;bottom:20px;left:0;right:0;text-align:center;font-family:'DM Mono',monospace;font-size:10px;color:rgba(255,255,255,.25);letter-spacing:.1em}
#sc-lock .lock-conn{position:absolute;top:18px;right:18px;width:34px;height:34px;border-radius:9px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);color:rgba(255,255,255,.4);display:grid;place-items:center;font-size:15px}
#sc-lock .lock-conn:hover{color:#fff}
#sc-lock .lock-status{font-family:'DM Mono',monospace;font-size:10px;margin-top:10px;color:rgba(255,255,255,.3);letter-spacing:.06em}
#sc-lock .lock-demo-btn{margin-top:18px;font-size:12px;color:#90CCFF;background:rgba(144,204,255,.08);border:1px solid rgba(144,204,255,.2);padding:8px 18px;border-radius:8px;font-weight:600}
@media (max-width:380px){
  #sc-lock .pin-pad{grid-template-columns:repeat(3,64px);gap:11px}
  #sc-lock .pin-key{width:64px;height:64px;font-size:22px}
}

/* ── TOPBAR ─────────────────────────────── */
.topbar{background:var(--royal);color:#fff;height:52px;display:flex;align-items:center;padding:0 14px;position:sticky;top:0;z-index:100;gap:10px}
.brand{display:flex;align-items:center;gap:9px;font-weight:700}
.brand-logo{width:28px;height:28px;border-radius:6px;background:linear-gradient(135deg,var(--baby),#fff);display:grid;place-items:center;font-size:13px;font-weight:800;color:var(--royal)}
.brand-text{font-size:13.5px;line-height:1}
.brand-sub{font-size:10px;opacity:.7;font-weight:500;margin-top:2px;letter-spacing:.06em;text-transform:uppercase}
.topbar-spacer{flex:1}
.conn-pill{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);padding:4px 10px;border-radius:20px;font-size:10.5px;font-weight:500;font-family:'DM Mono',monospace;white-space:nowrap}
.conn-pill .dot{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green)}
.conn-pill.demo .dot{background:var(--amber);box-shadow:0 0 6px var(--amber)}
.conn-pill.off .dot{background:var(--red);box-shadow:0 0 6px var(--red)}
.icon-btn{width:32px;height:32px;border-radius:8px;background:rgba(255,255,255,.08);color:#fff;display:grid;place-items:center;font-size:14px;border:1px solid rgba(255,255,255,.1);transition:background .15s;flex-shrink:0}
.icon-btn:hover{background:rgba(255,255,255,.16)}
.icon-btn.spin{animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.user-chip{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:600;background:rgba(255,255,255,.06);padding:4px 10px;border-radius:16px;border:1px solid rgba(255,255,255,.1);white-space:nowrap}
.user-chip .role{font-family:'DM Mono',monospace;font-size:9px;opacity:.65;text-transform:uppercase;letter-spacing:.08em}
@media (max-width:640px){
  .user-chip span.uname{display:none}
  .brand-sub{display:none}
  .conn-pill span.lbl{display:none}
}

/* ── TAB NAV ─────────────────────────────── */
.tabnav{background:var(--bg1);border-bottom:1px solid var(--line);display:flex;gap:2px;padding:0 14px;position:sticky;top:52px;z-index:90;overflow-x:auto;scrollbar-width:none}
.tabnav::-webkit-scrollbar{display:none}
.tabnav-btn{padding:13px 16px;font-size:12.5px;font-weight:600;color:var(--txt2);border-bottom:2px solid transparent;white-space:nowrap;display:flex;align-items:center;gap:7px;transition:color .15s}
.tabnav-btn:hover{color:var(--txt)}
.tabnav-btn.active{color:var(--royal);border-bottom-color:var(--orange)}
[data-t="dark"] .tabnav-btn.active{color:var(--baby)}
.tabnav-btn .cnt{font-family:'DM Mono',monospace;font-size:9.5px;background:var(--bg2);color:var(--txt2);padding:2px 6px;border-radius:4px;font-weight:500}
.tabnav-btn.active .cnt{background:var(--royal);color:#fff}
[data-t="dark"] .tabnav-btn.active .cnt{background:var(--baby);color:#0d0f1a}

/* ── PAGE ─────────────────────────────── */
.page{max-width:1320px;margin:0 auto;padding:20px 16px 80px}
.demo-banner{background:linear-gradient(135deg,rgba(245,158,11,.12),rgba(245,158,11,.04));border:1px dashed rgba(245,158,11,.4);border-radius:11px;padding:10px 14px;margin-bottom:16px;font-size:12px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.demo-banner b{color:var(--amber)}
.demo-banner button{font-size:11px;font-weight:700;color:var(--amber);border:1px solid rgba(245,158,11,.4);padding:4px 12px;border-radius:6px;margin-left:auto}

.section{margin-bottom:28px}
.section-head{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.section-title{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--royal)}
[data-t="dark"] .section-title{color:var(--baby)}
.section-line{flex:1;height:1px;background:linear-gradient(90deg,var(--line),transparent)}
.section-meta{font-size:11px;color:var(--txt2);font-family:'DM Mono',monospace}

.card{background:var(--bg1);border:1px solid var(--line);border-radius:13px;padding:18px;box-shadow:var(--card-sh)}
.placeholder{text-align:center;padding:48px 20px;color:var(--txt3);font-size:13px;border:1px dashed var(--line);border-radius:13px;background:var(--bg1)}
.placeholder .big{font-size:30px;display:block;margin-bottom:10px;opacity:.4}
.placeholder b{color:var(--txt2)}

.chip-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px;justify-content:center}
.chip{font-family:'DM Mono',monospace;font-size:11px;padding:5px 11px;border-radius:6px;font-weight:500}
.chip.red{background:rgba(239,68,68,.12);color:var(--red)}
.chip.green{background:rgba(34,197,94,.12);color:var(--green)}
.chip.amber{background:rgba(245,158,11,.14);color:var(--amber)}
.chip.gray{background:var(--bg2);color:var(--txt2)}

/* ── MODAL ─────────────────────────────── */
.modal-veil{position:fixed;inset:0;background:rgba(10,11,20,.55);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(2px)}
.modal{background:var(--bg1);border:1px solid var(--line);border-radius:16px;width:100%;max-width:640px;max-height:88vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--line)}
.modal-title{font-size:15px;font-weight:800}
.modal-x{width:30px;height:30px;border-radius:8px;display:grid;place-items:center;color:var(--txt2);font-size:16px}
.modal-x:hover{background:var(--bg2);color:var(--txt)}
.modal-body{padding:18px 20px;overflow-y:auto;flex:1}
.settabs{display:flex;gap:6px;margin-bottom:18px;flex-wrap:wrap}
.settab{font-size:11.5px;font-weight:600;padding:7px 13px;border-radius:8px;color:var(--txt2);background:var(--bg2)}
.settab.active{background:var(--royal);color:#fff}
[data-t="dark"] .settab.active{background:var(--baby);color:#0d0f1a}
.field{margin-bottom:14px}
.field label{display:block;font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--txt2);margin-bottom:6px}
.field input,.field select,.field textarea{width:100%;background:var(--bg3);border:1px solid var(--line);border-radius:9px;padding:9px 12px;color:var(--txt);outline:none}
.field input:focus,.field select:focus{border-color:var(--baby)}
.field input:disabled{opacity:.5}
.hint{font-size:11.5px;color:var(--txt2);line-height:1.55;margin-bottom:14px}
.hint b{color:var(--txt)}
.btn{display:inline-flex;align-items:center;gap:7px;font-size:12.5px;font-weight:700;padding:9px 16px;border-radius:9px;transition:all .15s}
.btn-primary{background:var(--royal);color:#fff}
.btn-primary:hover{opacity:.9}
[data-t="dark"] .btn-primary{background:var(--baby);color:#0d0f1a}
.btn-ghost{background:var(--bg2);color:var(--txt)}
.btn-danger{background:rgba(239,68,68,.1);color:var(--red)}
.btn-sm{font-size:11px;padding:6px 11px}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}

/* settings tables */
.mini-table{width:100%;border-collapse:collapse;font-size:12px}
.mini-table th{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--txt2);text-align:left;padding:7px 9px;border-bottom:1px solid var(--line)}
.mini-table td{padding:8px 9px;border-bottom:1px solid var(--line2);vertical-align:middle}
.mini-table tr:last-child td{border-bottom:0}
.mini-table .act{display:flex;gap:5px}
.mini-table .act button{font-size:13px;width:26px;height:26px;border-radius:6px;display:grid;place-items:center;color:var(--txt2)}
.mini-table .act button:hover{background:var(--bg2);color:var(--txt)}
.role-pill{font-family:'DM Mono',monospace;font-size:9.5px;padding:2.5px 7px;border-radius:4px;text-transform:uppercase;letter-spacing:.04em;font-weight:500}
.role-pill.owner{background:rgba(37,35,89,.12);color:var(--royal)}
[data-t="dark"] .role-pill.owner{background:rgba(144,204,255,.15);color:var(--baby)}
.role-pill.manager{background:rgba(34,197,94,.12);color:var(--green)}
.role-pill.coordinator{background:rgba(245,158,11,.14);color:var(--amber)}
.role-pill.sales{background:rgba(243,134,31,.13);color:var(--orange)}
.status-dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:5px}
.status-dot.active{background:var(--green)}
.status-dot.disabled{background:var(--txt3)}

/* toast */
#toast-wrap{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);z-index:2000;display:flex;flex-direction:column;gap:8px;align-items:center}
.toast{background:var(--royal);color:#fff;font-size:12.5px;font-weight:600;padding:10px 18px;border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.25);animation:toastIn .25s cubic-bezier(.16,1,.3,1);max-width:90vw;text-align:center}
.toast.err{background:var(--red)}
@keyframes toastIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeUp .4s cubic-bezier(.16,1,.3,1) backwards}
</style>
</head>
<body>

<!-- LOCK -->
<div id="sc-lock">
  <div class="lock-bg"></div>
  <button class="lock-conn" id="lock-conn-btn" title="Connection setup">⚙</button>
  <div class="lock-card">
    <div class="lock-logo">D</div>
    <div class="lock-brand">DSLRSWALA</div>
    <div class="lock-sub">Rental Management System</div>
    <div class="lock-prompt">Enter your 4-digit PIN</div>
    <div class="pin-dots">
      <div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div>
    </div>
    <div class="pin-pad">
      <button class="pin-key" data-k="1">1</button><button class="pin-key" data-k="2">2</button><button class="pin-key" data-k="3">3</button>
      <button class="pin-key" data-k="4">4</button><button class="pin-key" data-k="5">5</button><button class="pin-key" data-k="6">6</button>
      <button class="pin-key" data-k="7">7</button><button class="pin-key" data-k="8">8</button><button class="pin-key" data-k="9">9</button>

    <button class="lock-demo-btn hidden" id="lock-demo-btn">Explore demo →</button>
  </div>
  <div class="lock-foot">RMS.DSLRSWALA.COM</div>
</div>

<!-- APP -->
<div id="app" class="hidden">
  <header class="topbar">
    <div class="brand">
      <div class="brand-logo">D</div>
      <div>
        <div class="brand-text">DSLRSWALA</div>
        <div class="brand-sub">RMS</div>
      </div>
    </div>
    <div class="topbar-spacer"></div>
    <div class="conn-pill" id="conn-pill"><span class="dot"></span><span class="lbl" id="conn-label">LIVE</span></div>
    <div class="user-chip" id="user-chip"><span class="uname" id="user-name">—</span><span class="role" id="user-role">—</span></div>
    <button class="icon-btn" id="btn-refresh" title="Refresh data">⟳</button>
    <button class="icon-btn" id="btn-theme" title="Theme">☾</button>
    <button class="icon-btn hidden" id="btn-settings" title="Settings">⚙</button>
    <button class="icon-btn" id="btn-logout" title="Logout">⏻</button>
  </header>

  <nav class="tabnav" id="tabnav"></nav>

  <main class="page">
    <div class="demo-banner hidden" id="demo-banner">
      <b>Demo mode</b> — sample data, nothing is saved.
      <button id="demo-exit">Exit demo</button>
    </div>
    <div id="tab-content"></div>
  </main>
</div>

<div id="modal-root"></div>
<div id="toast-wrap"></div>

<script>
/* ════════════════════════════════════════════════
   CONFIG + STATE
════════════════════════════════════════════════ */
const LS = {
  api: 'rms_api_url',
  session: 'rms_session',
  theme: 'rms_theme',
};

const TABS = [
  { id:'intel',    label:'Intelligence',   roles:['owner','manager','coordinator'] },
  { id:'purchase', label:'Purchase',        roles:['owner','manager','coordinator'] },
  { id:'repsale',  label:'Repair & Sale',   roles:['owner','manager','coordinator','sales'] },
  { id:'enquiry',  label:'Enquiries',       roles:['owner','manager','coordinator','sales'] },
];

let S = {
  demo: false,
  token: null,
  user: null,
  role: null,
  data: {},
  tab: 'intel',
  pin: '',
};

function store(k, v){ try{ v===null ? localStorage.removeItem(k) : localStorage.setItem(k, typeof v==='string'?v:JSON.stringify(v)); }catch(e){} }
function load(k){ try{ return localStorage.getItem(k); }catch(e){ return null; } }
function loadJSON(k){ const v = load(k); if(!v) return null; try{ return JSON.parse(v); }catch(e){ return null; } }

/* ════════════════════════════════════════════════
   API
════════════════════════════════════════════════ */
function apiUrl(){ return (load(LS.api) || '').trim(); }

async function api(action, payload){
  if (S.demo) return demoApi(action, payload);
  const url = apiUrl();
  if (!url) throw { error:'NO_API', message:'No backend connected' };
  const body = JSON.stringify(Object.assign({ action: action, token: S.token }, payload || {}));
  const r = await fetch(url, { method:'POST', headers:{ 'Content-Type':'text/plain;charset=utf-8' }, body: body });
  const j = await r.json();
  if (j && j.error === 'AUTH'){ doLogout(true); throw j; }
  return j;
}

/* ════════════════════════════════════════════════
   DEMO DATA + DEMO API
════════════════════════════════════════════════ */
const DEMO = {
  user: { id:'demo', name:'Demo User', role:'owner' },
  data: {
    Products: [

/* ════════════════════════════════════════════════
   LOCK SCREEN
════════════════════════════════════════════════ */
function lockUpdate(){
  document.querySelectorAll('#sc-lock .pin-dot').forEach((d,i)=>d.classList.toggle('filled', i < S.pin.length));
}
function lockShake(msg){
  const el = document.getElementById('sc-lock');
  el.classList.add('shake');
  const err = document.getElementById('lock-err');
  err.textContent = msg || 'Wrong PIN';
  err.classList.add('show');
  setTimeout(()=>{ el.classList.remove('shake'); S.pin=''; lockUpdate(); }, 500);
  setTimeout(()=>err.classList.remove('show'), 2400);
}
async function lockTry(){
  const url = apiUrl();
  if (!url){ lockShake('No backend — tap ⚙ to connect'); return; }
  document.getElementById('lock-status').textContent = 'checking…';
  try{
    const r = await fetch(url, { method:'POST', headers:{'Content-Type':'text/plain;charset=utf-8'}, body: JSON.stringify({ action:'login', pin:S.pin }) });
    const j = await r.json();
    document.getElementById('lock-status').textContent = '';
    if (j.ok){
      S.token = j.token; S.user = j.user; S.role = j.user.role;
      store(LS.session, { token:j.token, user:j.user, at:Date.now() });
      await enterApp();
    } else {
      lockShake(j.error === 'Wrong PIN' ? 'Wrong PIN' : (j.message || j.error));
    }
  }catch(e){
    document.getElementById('lock-status').textContent = '';
    lockShake('Connection failed — check ⚙');
  }
}
function lockKey(k){
  document.getElementById('lock-err').classList.remove('show');
  if (k === 'del'){ S.pin = S.pin.slice(0,-1); lockUpdate(); return; }
  if (S.pin.length >= 4) return;
  S.pin += k; lockUpdate();
  if (S.pin.length === 4) setTimeout(lockTry, 130);
}
document.querySelectorAll('#sc-lock .pin-key[data-k]').forEach(b=>b.addEventListener('click', ()=>lockKey(b.dataset.k)));
document.addEventListener('keydown', e=>{
  if (document.getElementById('sc-lock').classList.contains('hidden')) return;
  if (/^[0-9]$/.test(e.key)) lockKey(e.key);
  else if (e.key === 'Backspace') lockKey('del');
});

document.getElementById('lock-conn-btn').onclick = ()=>{
  const cur = apiUrl();
  const v = prompt('Apps Script Web App URL (/exec):', cur || 'https://script.google.com/macros/s/…/exec');
  if (v === null) return;
  store(LS.api, v.trim());
  updateLockStatus();
};
function updateLockStatus(){
  const el = document.getElementById('lock-status');
  el.textContent = apiUrl() ? 'backend connected' : 'no backend — tap ⚙ top-right';
  document.getElementById('lock-demo-btn').classList.toggle('hidden', !!apiUrl());
}
document.getElementById('lock-demo-btn').onclick = ()=>{ location.search = '?demo=1'; };

async function enterApp(){
  document.getElementById('sc-lock').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  document.getElementById('user-name').textContent = S.user.name;
  document.getElementById('user-role').textContent = S.role;
  document.getElementById('btn-settings').classList.toggle('hidden', S.demo || S.role !== 'owner');
  document.getElementById('demo-banner').classList.toggle('hidden', !S.demo);
  setConn(S.demo ? 'demo' : 'live');
  buildTabs();
  await refresh();
}

function doLogout(expired){
  S.token = null; S.user = null; S.role = null; S.pin=''; S.data = {};
  store(LS.session, null);
  if (S.demo){ location.search = ''; return; }
  document.getElementById('app').classList.add('hidden');
  document.getElementById('sc-lock').classList.remove('hidden');
  lockUpdate();
  if (expired) lockShake('Session expired — log in');
}
document.getElementById('btn-logout').onclick = ()=>doLogout(false);

function setConn(mode){
  const pill = document.getElementById('conn-pill');
  pill.classList.remove('demo','off');
  const lbl = document.getElementById('conn-label');
  if (mode === 'demo'){ pill.classList.add('demo'); lbl.textContent = 'DEMO'; }
  else if (mode === 'off'){ pill.classList.add('off'); lbl.textContent = 'OFFLINE'; }
  else lbl.textContent = 'LIVE';
}

════════════════════════════════════════════════ */
async function refresh(){
  const btn = document.getElementById('btn-refresh');
  btn.classList.add('spin');
  try{
    const j = await api('bootstrap');
    if (j.ok){
      S.data = j.data;
      S.role = j.role || S.role;
      setConn(S.demo ? 'demo' : 'live');
      buildTabs();
      renderTab();
    } else if (j.error !== 'AUTH'){
      toast(j.message || j.error, true);
    }
  }catch(e){
    if (e.error !== 'AUTH'){ setConn('off'); toast('Refresh failed — offline?', true); }
  }
  btn.classList.remove('spin');
}
document.getElementById('btn-refresh').onclick = refresh;

function visibleTabs(){
  return TABS.filter(t => t.roles.includes(S.role));
}
function tabCount(id){
  const d = S.data || {};
  if (id==='intel')    return (d.Products||[]).length;
  if (id==='purchase') return (d.Purchase||[]).length;
  if (id==='repsale')  return (d.Repairs||[]).length + (d.Sales||[]).length;
  if (id==='enquiry')  return (d.Enquiries||[]).length;
  return 0;
}
function buildTabs(){
  const tabs = visibleTabs();
  if (!tabs.find(t=>t.id===S.tab)) S.tab = tabs[0] ? tabs[0].id : 'repsale';
  const nav = document.getElementById('tabnav');
  nav.innerHTML = '';
  tabs.forEach(t=>{
    const b = document.createElement('button');
    b.className = 'tabnav-btn' + (t.id===S.tab?' active':'');
    b.innerHTML = `${t.label} <span class="cnt">${tabCount(t.id)}</span>`;
    b.onclick = ()=>{ S.tab = t.id; buildTabs(); renderTab(); };
    nav.appendChild(b);
  });
}

  document.getElementById('btn-save-user').onclick = ()=>saveUser(u.id||'');
}
async function saveUser(id){
  const rec = {
    id: id || undefined,
    name: document.getElementById('f-name').value.trim(),
    pin: document.getElementById('f-pin').value.trim(),
    role: document.getElementById('f-role').value,
    status: document.getElementById('f-status').value,
  };
  if (!rec.name || !/^\d{4}$/.test(rec.pin)){ toast('Name + 4-digit PIN required', true); return; }
  const j = await api('save', { table:'Users', record: rec });
  if (j.ok){ toast(j.demo?'Demo — not saved':'User saved'); await refresh(); openSettings('users'); }
  else toast(j.message || j.error, true);
}

function editDealer(dl){
  const isNew = !dl;
  dl = dl || { name:'', city:'', phone:'', whatsapp:'', speciality:'', status:'active' };
  const body = `
    <div class="field"><label>Dealer name</label><input id="f-dname" value="${escA(dl.name)}"></div>
    <div class="field"><label>City</label><input id="f-dcity" value="${escA(dl.city||'')}"></div>
    <div class="field"><label>Phone</label><input id="f-dphone" value="${escA(String(dl.phone||''))}" inputmode="numeric"></div>
    <div class="field"><label>WhatsApp (91XXXXXXXXXX)</label><input id="f-dwa" value="${escA(String(dl.whatsapp||''))}" inputmode="numeric"></div>
    <div class="field"><label>Speciality</label><input id="f-dspec" value="${escA(dl.speciality||'')}"></div>
    <div class="btn-row">
      <button class="btn btn-primary" id="btn-save-dealer">${isNew?'Add dealer':'Save'}</button>
      <button class="btn btn-ghost" onclick="openSettings('dealers')">Cancel</button>
    </div>`;
  showModal(isNew?'Add Photogoods dealer':'Edit dealer', body);
  document.getElementById('btn-save-dealer').onclick = ()=>saveDealer(dl.id||'');
}
async function saveDealer(id){
  const rec = {
    id: id || undefined,
    name: document.getElementById('f-dname').value.trim(),
    city: document.getElementById('f-dcity').value.trim(),
    phone: document.getElementById('f-dphone').value.trim(),
    whatsapp: document.getElementById('f-dwa').value.trim(),
    speciality: document.getElementById('f-dspec').value.trim(),
    status: 'active',
  };
  if (!rec.name){ toast('Name required', true); return; }
  const j = await api('save', { table:'Dealers', record: rec });
  if (j.ok){ toast(j.demo?'Demo — not saved':'Dealer saved'); await refresh(); openSettings('dealers'); }
  else toast(j.message || j.error, true);
}

async function delRecord(table, id){
  if (!confirm('Delete this record?')) return;
  const j = await api('delete', { table: table, id: id });
  if (j.ok){ toast(j.demo?'Demo — not saved':'Deleted'); await refresh(); openSettings(setTab); }
  else toast(j.message || j.error, true);
}

/* ════════════════════════════════════════════════
   MODAL + TOAST
════════════════════════════════════════════════ */
function showModal(title, bodyHtml){
  const root = document.getElementById('modal-root');
  root.innerHTML = `
    <div class="modal-veil" id="modal-veil">
      <div class="modal">
        <div class="modal-head">
          <div class="modal-title">${esc(title)}</div>
          <button class="modal-x" onclick="closeModal()">✕</button>
        </div>
        <div class="modal-body">${bodyHtml}</div>
      </div>
    </div>`;
  document.getElementById('modal-veil').addEventListener('click', function(e){
    if (e.target === this) closeModal();
  });
}
function closeModal(){ document.getElementById('modal-root').innerHTML = ''; }

function toast(msg, isErr){
  const w = document.getElementById('toast-wrap');
  const t = document.createElement('div');
  t.className = 'toast' + (isErr?' err':'');
  t.textContent = msg;
  w.appendChild(t);
  setTimeout(()=>t.remove(), 2800);
}

/* ════════════════════════════════════════════════
   HELPERS
════════════════════════════════════════════════ */
function esc(s){ return s==null?'':String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escA(s){ return esc(s).replace(/'/g,'&#39;'); }

/* ════════════════════════════════════════════════
   BOOT
════════════════════════════════════════════════ */
(async function boot(){
  const params = new URLSearchParams(location.search);
  document.getElementById('demo-exit').onclick = ()=>{ location.search=''; };

  if (params.get('demo') === '1'){
    S.demo = true;
    S.user = DEMO.user; S.role = 'owner'; S.token = 'demo';
    await enterApp();
    return;
  }
  updateLockStatus();

  const sess = loadJSON(LS.session);
  if (sess && sess.token && Date.now() - (sess.at||0) < 12*60*60*1000){
    S.token = sess.token; S.user = sess.user; S.role = sess.user.role;
    try{
      const j = await api('whoami');
      if (j.ok){ await enterApp(); return; }
    }catch(e){}
    store(LS.session, null);
    S.token = null; S.user = null; S.role = null;
  }
})();
</script>
